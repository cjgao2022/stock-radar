<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}股票雷达{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    /* ══ 亮色主题（默认） ══ */
    :root {
      --bg:          #eef0f6;
      --card-bg:     #ffffff;
      --dark1:       #0d1526;
      --dark2:       #121d35;
      --dark3:       #1a2845;
      --accent:      #3d7efc;
      --accent2:     #5b8ff9;
      --up:          #e8374a;
      --up-bg:       #fff0f1;
      --up-border:   #ffd0d4;
      --down:        #18a361;
      --down-bg:     #edf9f3;
      --down-border: #c3ecd8;
      --flat:        #8a94aa;
      --flat-bg:     #f3f4f8;
      --text1:       #1a2035;
      --text2:       #4a5578;
      --text3:       #8a94aa;
      --border:      #e4e8f2;
      --border2:     #d8dce8;
      --num:         'Roboto Mono', 'SF Mono', 'Consolas', monospace;
      --shadow-sm:   0 1px 4px rgba(0,0,0,.06);
      --shadow-md:   0 2px 12px rgba(0,0,0,.09);
      --thead-bg:    #f7f9fc;
      --tbody-hover: #f5f8ff;
      --td-border:   #f0f3f9;
      --input-bg:    #f5f7fc;
      --input-focus: #ffffff;
    }

    /* ══ 深色主题 ══ */
    [data-theme="dark"] {
      --bg:          #080e1c;
      --card-bg:     #111827;
      --dark1:       #060c18;
      --dark2:       #0c1528;
      --dark3:       #132038;
      --up-bg:       rgba(232,55,74,.14);
      --up-border:   rgba(232,55,74,.28);
      --down-bg:     rgba(24,163,97,.13);
      --down-border: rgba(24,163,97,.26);
      --flat-bg:     rgba(255,255,255,.07);
      --text1:       rgba(255,255,255,.88);
      --text2:       rgba(255,255,255,.55);
      --text3:       rgba(255,255,255,.32);
      --border:      rgba(255,255,255,.08);
      --border2:     rgba(255,255,255,.13);
      --shadow-sm:   0 1px 8px rgba(0,0,0,.35);
      --shadow-md:   0 2px 20px rgba(0,0,0,.45);
      --thead-bg:    rgba(255,255,255,.04);
      --tbody-hover: rgba(255,255,255,.05);
      --td-border:   rgba(255,255,255,.05);
      --input-bg:    rgba(255,255,255,.07);
      --input-focus: rgba(255,255,255,.1);
    }

    /* ── 全局 ── */
    body {
      background: var(--bg);
      color: var(--text1);
      font-size: .9rem;
      transition: background .3s, color .3s;
    }
    [data-theme="dark"] body,
    [data-theme="dark"] {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 0%,   rgba(61,126,252,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(24,163,97,.06)  0%, transparent 55%);
      background-attachment: fixed;
    }
    a { color: var(--accent); }

    /* ── 导航栏 ── */
    .topnav {
      background: linear-gradient(90deg, var(--dark1) 0%, var(--dark2) 60%, var(--dark3) 100%);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 0 1rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.25);
    }
    .topnav .brand {
      font-size: 1.1rem; font-weight: 800; letter-spacing: 1.5px;
      color: #ffffff; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, #7ab3f8 100%);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .topnav .nav-links { display: flex; gap: 4px; }
    .topnav .nav-links a {
      color: rgba(255,255,255,.6); text-decoration: none;
      font-size: .85rem; font-weight: 500;
      padding: 6px 14px; border-radius: 6px;
      transition: all .18s; letter-spacing: .3px;
    }
    .topnav .nav-links a:hover  { color: #fff; background: rgba(255,255,255,.1); }
    .topnav .nav-links a.active { color: #fff; background: rgba(61,126,252,.35); }

    /* 导航栏右侧 */
    .topnav .market-status {
      display: flex; align-items: center; gap: 10px;
      font-size: .72rem; color: rgba(255,255,255,.45); letter-spacing: .3px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3be08b; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* 主题切换按钮 */
    .theme-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .theme-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* 导航栏指数行情 */
    .nav-indices { display: flex; gap: 12px; align-items: center; }
    .nav-idx-item { display: flex; align-items: baseline; gap: 5px; font-size: .74rem; letter-spacing: .2px; }
    .nav-idx-name  { color: rgba(255,255,255,.35); }
    .nav-idx-price { color: rgba(255,255,255,.8); font-weight: 700; font-variant-numeric: tabular-nums; }
    .nav-idx-chg   { font-size: .7rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .nav-idx-chg.up   { color: #f08090; }
    .nav-idx-chg.down { color: #56c98e; }
    @media (max-width: 900px) { .nav-indices { display: none; } }

    /* ── 主布局 ── */
    .main-wrap { padding: 16px 16px 32px; }

    /* ── 通用卡片 ── */
    .panel {
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: background .3s, border-color .3s;
    }
    .panel-hd {
      background: linear-gradient(90deg, var(--dark1) 0%, var(--dark3) 100%);
      color: rgba(255,255,255,.85);
      padding: 10px 16px; font-size: .8rem; font-weight: 600; letter-spacing: .6px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-hd .hd-title { display: flex; align-items: center; gap: 8px; }
    .panel-hd .accent-bar {
      width: 3px; height: 14px;
      background: linear-gradient(180deg, var(--accent) 0%, #7ab3f8 100%);
      border-radius: 2px;
    }
    .panel-body       { padding: 14px 16px; }
    .panel-body-flush { padding: 0; }

    /* ── 深色统计卡 ── */
    .stat-card {
      background: linear-gradient(135deg, var(--dark1) 0%, var(--dark3) 100%);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 14px 16px; color: #e0e8f8;
    }
    .stat-card .sc-label { font-size: .7rem; color: rgba(255,255,255,.4); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-card .sc-value { font-size: 1.55rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1.15; }
    .stat-card .sc-sub   { font-size: .72rem; color: rgba(255,255,255,.35); margin-top: 3px; }
    .stat-card .sc-value.up   { color: var(--up); }
    .stat-card .sc-value.down { color: var(--down); }

    /* ── 指数卡（首页） ── */
    .idx-card {
      background: linear-gradient(135deg, var(--dark1) 0%, var(--dark3) 100%);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 12px 14px; color: #e0e8f8;
      position: relative; overflow: hidden; transition: border-color .2s;
    }
    .idx-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    }
    .idx-card.up::before   { background: var(--up); }
    .idx-card.down::before { background: var(--down); }
    .idx-card.flat::before { background: rgba(255,255,255,.15); }
    .idx-card:hover        { border-color: rgba(255,255,255,.14); }
    .idx-card .idx-name  { font-size: .7rem; color: rgba(255,255,255,.4); letter-spacing: .4px; }
    .idx-card .idx-price { font-size: 1.4rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1.2; color: rgba(255,255,255,.92); }
    .idx-card .idx-chg   { font-size: .8rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .idx-card .up   { color: #f08090 !important; }
    .idx-card .down { color: #56c98e !important; }
    .idx-card .flat { color: rgba(255,255,255,.4) !important; }

    /* ── 涨跌色 ── */
    .up   { color: var(--up)   !important; }
    .down { color: var(--down) !important; }
    .flat { color: var(--flat) !important; }

    /* ── 涨跌 Badge ── */
    .chg-badge {
      display: inline-block; min-width: 68px; text-align: center;
      padding: 2px 6px; border-radius: 5px;
      font-size: .78rem; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .chg-badge.up   { background: var(--up-bg);   color: var(--up);   border: 1px solid var(--up-border); }
    .chg-badge.down { background: var(--down-bg); color: var(--down); border: 1px solid var(--down-border); }
    .chg-badge.flat { background: var(--flat-bg); color: var(--flat); border: 1px solid var(--border); }

    /* ── 数字字体 ── */
    .num { font-variant-numeric: tabular-nums; font-family: var(--num); }

    /* ── 表格 ── */
    .data-table { font-size: .84rem; width: 100%; }
    .data-table thead th {
      background: var(--thead-bg);
      color: var(--text2);
      font-weight: 600; font-size: .74rem; letter-spacing: .4px;
      border-bottom: 2px solid var(--border);
      padding: 8px 12px; white-space: nowrap;
      transition: background .3s, color .3s;
    }
    .data-table tbody td {
      padding: 8px 12px;
      border-color: var(--td-border);
      vertical-align: middle;
      color: var(--text1);
      transition: background .3s;
    }
    .data-table tbody tr:hover { background: var(--tbody-hover); }
    .data-table .sortable { cursor: pointer; user-select: none; }
    .data-table .sortable:hover { color: var(--accent); }

    /* ── 进度条 ── */
    .mini-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; }
    .mini-bar-fill { height: 5px; border-radius: 3px; }
    .mini-bar-fill.up     { background: linear-gradient(90deg, #f67280, var(--up)); }
    .mini-bar-fill.down   { background: linear-gradient(90deg, #56ab80, var(--down)); }
    .mini-bar-fill.accent { background: linear-gradient(90deg, var(--accent2), var(--accent)); }

    /* ── 日内区间条 ── */
    .range-bar { position: relative; height: 4px; background: var(--border); border-radius: 2px; width: 80px; flex-shrink: 0; }
    .range-bar-cur { position: absolute; width: 8px; height: 8px; border-radius: 50%; top: -2px; transform: translateX(-50%); }
    .range-bar-cur.up   { background: var(--up); }
    .range-bar-cur.down { background: var(--down); }

    /* ── 搜索框 ── */
    .search-wrap { position: relative; }
    .search-wrap .form-control {
      background: var(--input-bg); border: 1px solid var(--border);
      color: var(--text1);
      padding-left: 2.2rem; border-radius: 7px; font-size: .875rem;
      transition: background .3s, border-color .2s;
    }
    .search-wrap .form-control:focus {
      background: var(--input-focus); border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,126,252,.15);
      color: var(--text1);
    }
    .search-wrap .si { position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); color: var(--text3); }

    /* ── 深色模式文字修正 ── */
    [data-theme="dark"] .text-muted { color: rgba(255,255,255,.35) !important; }
    [data-theme="dark"] .form-control::placeholder { color: rgba(255,255,255,.25); }

    /* ══ 亮色模式覆盖（针对硬编码深色组件） ══ */

    /* 导航栏 */
    [data-theme="light"] .topnav {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(0,0,0,.07);
    }
    [data-theme="light"] .topnav .brand { color: var(--text1); }
    [data-theme="light"] .topnav .nav-links a { color: var(--text2); }
    [data-theme="light"] .topnav .nav-links a:hover  { color: var(--text1); background: #f0f3fa; }
    [data-theme="light"] .topnav .nav-links a.active { color: var(--accent); background: #e8f0fe; }
    [data-theme="light"] .topnav .market-status { color: var(--text3); }
    [data-theme="light"] .theme-btn { border-color: var(--border2); background: var(--flat-bg); color: var(--text2); }
    [data-theme="light"] .nav-idx-name  { color: var(--text3); }
    [data-theme="light"] .nav-idx-price { color: var(--text1); }
    [data-theme="light"] .nav-idx-chg.up   { color: var(--up);   }
    [data-theme="light"] .nav-idx-chg.down { color: var(--down); }

    /* panel-hd */
    [data-theme="light"] .panel-hd {
      background: #f7f9fc;
      color: var(--text1);
      border-bottom: 1px solid var(--border);
    }

    /* 统计卡 */
    [data-theme="light"] .stat-card {
      background: #ffffff;
      border-color: var(--border);
      color: var(--text1);
    }
    [data-theme="light"] .stat-card .sc-label { color: var(--text3); }
    [data-theme="light"] .stat-card .sc-sub   { color: var(--text3); }

    /* 指数卡 */
    [data-theme="light"] .idx-card {
      background: #ffffff;
      border-color: var(--border);
      color: var(--text1);
    }
    [data-theme="light"] .idx-card:hover { border-color: var(--accent2); }
    [data-theme="light"] .idx-card .idx-name  { color: var(--text3); }
    [data-theme="light"] .idx-card .idx-price { color: var(--text1); }
    [data-theme="light"] .idx-card .up   { color: var(--up)   !important; }
    [data-theme="light"] .idx-card .down { color: var(--down) !important; }
    [data-theme="light"] .idx-card .flat { color: var(--flat) !important; }

    /* ── 口令确认弹框 ── */
    #code-confirm-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.52); backdrop-filter: blur(2px);
      align-items: center; justify-content: center;
    }
    #code-confirm-overlay.show { display: flex; }
    .cc-box {
      background: var(--card-bg); border: 1px solid var(--border2);
      border-radius: 14px; padding: 28px 28px 22px;
      width: 320px; box-shadow: var(--shadow-md);
      animation: cc-in .15s ease;
    }
    @keyframes cc-in { from { transform: scale(.93); opacity:0 } to { transform: scale(1); opacity:1 } }
    .cc-title { font-size: .95rem; font-weight: 700; color: var(--text1); margin-bottom: 6px; }
    .cc-desc  { font-size: .8rem; color: var(--text2); margin-bottom: 16px; line-height: 1.55; }
    .cc-desc strong { color: var(--accent); font-family: var(--num); letter-spacing: .5px; }
    #cc-input {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid var(--border2); background: var(--input-bg);
      color: var(--text1); font-size: .95rem; font-family: var(--num);
      letter-spacing: 1px; outline: none; transition: border-color .15s;
    }
    #cc-input:focus { border-color: var(--accent); background: var(--input-focus); }
    #cc-input.shake { animation: cc-shake .3s ease; border-color: var(--up); }
    @keyframes cc-shake {
      0%,100%{ transform:translateX(0) }
      25%    { transform:translateX(-6px) }
      75%    { transform:translateX(6px) }
    }
    #cc-err { font-size: .75rem; color: var(--up); min-height: 18px; margin-top: 5px; }
    .cc-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .cc-btn-cancel {
      padding: 6px 16px; border-radius: 7px; font-size: .82rem;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); cursor: pointer; transition: all .15s;
    }
    .cc-btn-cancel:hover { background: var(--flat-bg); color: var(--text1); }
    .cc-btn-ok {
      padding: 6px 18px; border-radius: 7px; font-size: .82rem;
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; font-weight: 600; transition: opacity .15s;
    }
    .cc-btn-ok:hover { opacity: .85; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="topnav">
  <a class="brand" href="/">
    <div class="brand-icon">📡</div>
    <span>STOCK RADAR</span>
  </a>
  <div class="nav-links">
    <a href="/"       id="nav-overview">大盘</a>
    <a href="/boards" id="nav-boards">板块</a>
    <a href="/stocks" id="nav-stocks">个股</a>
    <a href="/etf"    id="nav-etf">ETF</a>
  </div>
  <div class="nav-indices" id="nav-indices"></div>
  <div class="market-status">
    <button class="theme-btn" id="theme-btn" title="切换主题" onclick="toggleTheme()">🌙</button>
    <span class="status-dot" id="status-dot"></span>
    <span id="market-time">--:--:--</span>
  </div>
</nav>

<!-- 口令确认弹框（全局共用） -->
<div id="code-confirm-overlay">
  <div class="cc-box">
    <div class="cc-title">操作确认</div>
    <div class="cc-desc">请输入口令以确认</div>
    <input id="cc-input" type="text" placeholder="输入6位代码" maxlength="6" autocomplete="off" spellcheck="false">
    <div id="cc-err"></div>
    <div class="cc-actions">
      <button class="cc-btn-cancel" onclick="ccCancel()">取消</button>
      <button class="cc-btn-ok" onclick="ccSubmit()">确认</button>
    </div>
  </div>
</div>

<div class="main-wrap">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── 主题管理 ──
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved, false);
})();

function applyTheme(theme, save) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  if (save) localStorage.setItem('theme', theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark', true);
}

// ── 高亮当前导航 ──
(function() {
  const path = location.pathname;
  const map = { '/': 'nav-overview', '/boards': 'nav-boards', '/stocks': 'nav-stocks', '/etf': 'nav-etf' };
  const key = Object.keys(map).find(k => k !== '/' ? path.startsWith(k) : path === '/');
  if (key) document.getElementById(map[key])?.classList.add('active');
})();

// ── 实时时钟 + 市场状态 ──
function updateClock() {
  const now = new Date();
  document.getElementById('market-time').textContent =
    now.toLocaleTimeString('zh-CN', { hour12: false, timeZone: 'Asia/Shanghai' });
  const h = now.getHours(), m = now.getMinutes();
  const inSession = (h > 9 || (h === 9 && m >= 25)) && (h < 15 || (h === 15 && m === 0));
  const dot = document.getElementById('status-dot');
  if (dot) {
    dot.style.background = inSession ? '#3be08b' : '#6c7a99';
    dot.style.animation  = inSession ? 'blink 2s infinite' : 'none';
  }
}
updateClock();
setInterval(updateClock, 1000);

// ── 导航栏实时指数 ──
function loadNavIndices() {
  fetch('/api/indices').then(r=>r.json()).then(data=>{
    const show = data.filter(d=>['上证指数','深证成指','创业板指','科创50'].includes(d.name));
    document.getElementById('nav-indices').innerHTML = show.map(d=>{
      const cls = d.change_pct>0?'up':d.change_pct<0?'down':'';
      return `<div class="nav-idx-item">
        <span class="nav-idx-name">${d.name.replace('指数','').replace('深证成指','深证').replace('科创50','科创')}</span>
        <span class="nav-idx-price">${d.price!=null?d.price.toFixed(2):'--'}</span>
        <span class="nav-idx-chg ${cls}">${d.change_pct!=null?(d.change_pct>0?'+':'')+d.change_pct.toFixed(2)+'%':'--'}</span>
      </div>`;
    }).join('');
  }).catch(()=>{});
}
loadNavIndices();
setInterval(loadNavIndices, 30000);

// ── 口令确认弹框 ──
let _ccPending = null;

function requireCode(code, onConfirm) {
  _ccPending = { code, onConfirm };
  document.getElementById('cc-input').value = '';
  document.getElementById('cc-err').textContent = '';
  const inp = document.getElementById('cc-input');
  inp.classList.remove('shake');
  document.getElementById('code-confirm-overlay').classList.add('show');
  setTimeout(() => inp.focus(), 80);
}

function ccSubmit() {
  const inp = document.getElementById('cc-input');
  const val = inp.value.trim();
  if (val !== _ccPending?.code) {
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    document.getElementById('cc-err').textContent = '口令不匹配，请重新输入';
    inp.select();
    return;
  }
  document.getElementById('code-confirm-overlay').classList.remove('show');
  const cb = _ccPending.onConfirm;
  _ccPending = null;
  cb();
}

function ccCancel() {
  document.getElementById('code-confirm-overlay').classList.remove('show');
  _ccPending = null;
}

document.getElementById('cc-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') ccSubmit();
  if (e.key === 'Escape') ccCancel();
});
document.getElementById('code-confirm-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) ccCancel();
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
